<!-- templates/simulado/criar_simulado.html -->
{% extends 'base.html' %}

{% block title %}Criar Simulado{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-box">
        <h1>Criar Novo Simulado</h1>

        <!-- Formulário para criar o simulado -->
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_nome">Nome do Simulado</label>
                <input type="text" name="nome" id="id_nome" class="form-control">
            </div>

            <div class="form-group">
                <label for="id_materia">Matéria</label>
                <select name="materia" id="id_materia" class="form-control">
                    <option value="portugues">Português</option>
                    <option value="matematica">Matemática</option>
                    <!-- Adicione mais opções conforme necessário -->
                </select>
            </div>

            <div class="form-group">
                <label for="id_data_inicio">Data de Início</label>
                <input type="datetime-local" name="data_inicio" id="id_data_inicio" class="form-control">
            </div>

            <div class="form-group">
                <label for="id_turma">Turma</label>
                <select name="turma" id="id_turma" class="form-control">
                    {% for turma in turmas %}
                        <option value="{{ turma.id }}">{{ turma.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Criar Simulado</button>
        </form>
    </div>
</div>
{% endblock %}
